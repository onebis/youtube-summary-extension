<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Summary</title>
    <link rel="stylesheet" href="./sidepanel.css" />
  </head>
  <body>
    <header>
      <h1 data-i18n="appTitle">YouTube Summary</h1>
      <div class="header-controls">
        <button
          type="button"
          id="copy-btn"
          class="header-btn"
          disabled
          aria-label="Copy"
        >
          <span aria-hidden="true">📋</span>
          <span data-i18n="copyButton">コピー</span>
        </button>
        <button
          type="button"
          id="regenerate-btn"
          class="header-btn"
          disabled
          aria-label="Regenerate"
        >
          <span aria-hidden="true">🔄</span>
          <span data-i18n="regenerateButton">再生成</span>
        </button>
        <select id="output-lang" class="lang-select" aria-label="Output language">
          <option value="ja" data-i18n="outputLangJa">日本語</option>
          <option value="en" data-i18n="outputLangEn">English</option>
        </select>
        <div class="mode-toggle" role="radiogroup" aria-label="Summary length">
          <button
            type="button"
            class="mode-btn"
            data-mode="short"
            role="radio"
            aria-checked="true"
            data-i18n="modeShort"
          >
            短め
          </button>
          <button
            type="button"
            class="mode-btn"
            data-mode="medium"
            role="radio"
            aria-checked="false"
            data-i18n="modeMedium"
          >
            中間
          </button>
          <button
            type="button"
            class="mode-btn"
            data-mode="detailed"
            role="radio"
            aria-checked="false"
            data-i18n="modeDetailed"
          >
            詳細
          </button>
        </div>
        <button
          type="button"
          id="settings-btn"
          class="header-btn icon-only"
          data-i18n-aria="settingsButton"
          aria-label="Settings"
        >
          <span aria-hidden="true">⚙</span>
        </button>
      </div>
    </header>
    <div id="video-changed-banner" class="banner" hidden>
      <span data-i18n="videoNavigatedBanner">別の動画が表示されています</span>
      <button type="button" id="summarize-new-btn" class="banner-btn" data-i18n="summarizeNewVideoButton">
        この動画を要約
      </button>
    </div>
    <main>
      <div id="empty-state">
        <p data-i18n="emptyState">
          YouTube動画ページの「Summarize」ボタンを押してください。
        </p>
      </div>
      <div id="loading" hidden>
        <div class="skeleton skeleton-line" style="width: 90%"></div>
        <div class="skeleton skeleton-line" style="width: 70%"></div>
        <div class="skeleton skeleton-line" style="width: 80%"></div>
        <div class="skeleton skeleton-line" style="width: 60%"></div>
        <p id="loading-message" class="loading-message">処理中...</p>
        <button type="button" id="cancel-btn" class="action-btn cancel-btn">
          <span aria-hidden="true">✕</span>
          <span data-i18n="cancelButton">中止</span>
        </button>
      </div>
      <div id="error" hidden>
        <p id="error-message"></p>
        <p id="error-detail" class="error-detail" hidden></p>
        <button
          type="button"
          id="open-options-btn"
          class="action-btn primary"
          data-i18n="openOptionsButton"
          hidden
        >
          設定を開く
        </button>
      </div>
      <article id="result" hidden>
        <p id="result-meta"></p>
        <div id="summary-content" class="markdown-body"></div>
      </article>
    </main>
    <div id="toast" class="toast" hidden></div>
    <script type="module" src="./sidepanel.ts"></script>
  </body>
</html>
