<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="optionsTitle">YouTube Summary - Options</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <h1 data-i18n="optionsTitle">YouTube Summary - Options</h1>
    <form id="form">
      <fieldset>
        <legend data-i18n="languageSettingsLegend">言語設定</legend>
        <label>
          <span data-i18n="uiLanguageLabel">UI言語</span>
          <select id="ui-language">
            <option value="auto" data-i18n="langAuto">自動（ブラウザの言語）</option>
            <option value="ja" data-i18n="langJa">日本語</option>
            <option value="en" data-i18n="langEn">English</option>
          </select>
        </label>
        <label>
          <span data-i18n="outputLanguageLabel">要約出力言語のデフォルト</span>
          <select id="output-language">
            <option value="ja" data-i18n="langJa">日本語</option>
            <option value="en" data-i18n="langEn">English</option>
          </select>
        </label>
      </fieldset>

      <fieldset>
        <legend data-i18n="providerSelectLegend">使用するプロバイダ</legend>
        <div class="radio-row">
          <label class="radio-label">
            <input type="radio" name="provider" value="claude" />
            <span>Claude</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="provider" value="openai" />
            <span>OpenAI</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="provider" value="gemini" />
            <span>Gemini</span>
          </label>
        </div>
      </fieldset>

      <details class="provider-section" data-provider="claude">
        <summary>Claude API</summary>
        <label>
          <span data-i18n="apiKeyLabel">API Key</span>
          <input
            type="password"
            id="claude-key"
            autocomplete="off"
            spellcheck="false"
            placeholder="sk-ant-..."
          />
        </label>
        <label>
          <span data-i18n="modelLabel">Model</span>
          <input type="text" id="claude-model" spellcheck="false" />
        </label>
      </details>

      <details class="provider-section" data-provider="openai">
        <summary>OpenAI API</summary>
        <label>
          <span data-i18n="apiKeyLabel">API Key</span>
          <input
            type="password"
            id="openai-key"
            autocomplete="off"
            spellcheck="false"
            placeholder="sk-..."
          />
        </label>
        <label>
          <span data-i18n="modelLabel">Model</span>
          <input type="text" id="openai-model" spellcheck="false" />
        </label>
      </details>

      <details class="provider-section" data-provider="gemini">
        <summary>Gemini API</summary>
        <label>
          <span data-i18n="apiKeyLabel">API Key</span>
          <input
            type="password"
            id="gemini-key"
            autocomplete="off"
            spellcheck="false"
            placeholder="AIza..."
          />
        </label>
        <label>
          <span data-i18n="modelLabel">Model</span>
          <input type="text" id="gemini-model" spellcheck="false" />
        </label>
      </details>

      <p class="hint" data-i18n="apiKeyHint">
        APIキーはこの拡張機能のローカルストレージにのみ保存され、外部に送信されません。
      </p>

      <div class="actions">
        <button type="submit" data-i18n="saveButton">保存</button>
        <p id="status" aria-live="polite"></p>
      </div>
    </form>
    <script type="module" src="./options.ts"></script>
  </body>
</html>
