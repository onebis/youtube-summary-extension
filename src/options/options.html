<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Summary - Options</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <h1>YouTube Summary - Options</h1>
    <form id="form">
      <fieldset>
        <legend>使用するプロバイダ</legend>
        <div class="radio-row">
          <label class="radio-label">
            <input type="radio" name="provider" value="claude" />
            <span>Claude</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="provider" value="openai" />
            <span>OpenAI</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="provider" value="gemini" />
            <span>Gemini</span>
          </label>
        </div>
      </fieldset>

      <details class="provider-section" data-provider="claude">
        <summary>Claude API</summary>
        <label>
          <span>API Key</span>
          <input
            type="password"
            id="claude-key"
            autocomplete="off"
            spellcheck="false"
            placeholder="sk-ant-..."
          />
        </label>
        <label>
          <span>Model</span>
          <input type="text" id="claude-model" spellcheck="false" />
        </label>
      </details>

      <details class="provider-section" data-provider="openai">
        <summary>OpenAI API</summary>
        <label>
          <span>API Key</span>
          <input
            type="password"
            id="openai-key"
            autocomplete="off"
            spellcheck="false"
            placeholder="sk-..."
          />
        </label>
        <label>
          <span>Model</span>
          <input type="text" id="openai-model" spellcheck="false" />
        </label>
      </details>

      <details class="provider-section" data-provider="gemini">
        <summary>Gemini API</summary>
        <label>
          <span>API Key</span>
          <input
            type="password"
            id="gemini-key"
            autocomplete="off"
            spellcheck="false"
            placeholder="AIza..."
          />
        </label>
        <label>
          <span>Model</span>
          <input type="text" id="gemini-model" spellcheck="false" />
        </label>
      </details>

      <p class="hint">
        APIキーはこの拡張機能のローカルストレージにのみ保存され、外部に送信されません（要約実行時を除く）。アクティブなプロバイダのキーのみが要約呼び出しに使用されます。
      </p>

      <div class="actions">
        <button type="submit">保存</button>
        <p id="status" aria-live="polite"></p>
      </div>
    </form>
    <script type="module" src="./options.ts"></script>
  </body>
</html>
