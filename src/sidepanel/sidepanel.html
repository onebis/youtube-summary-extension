<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Summary</title>
    <link rel="stylesheet" href="./sidepanel.css" />
  </head>
  <body>
    <header>
      <h1 data-i18n="appTitle">YouTube Summary</h1>
      <div class="header-controls">
        <select id="output-lang" class="lang-select" aria-label="Output language">
          <option value="ja" data-i18n="outputLangJa">日本語</option>
          <option value="en" data-i18n="outputLangEn">English</option>
        </select>
        <div class="mode-toggle" role="radiogroup" aria-label="Summary length">
          <button
            type="button"
            class="mode-btn"
            data-mode="short"
            role="radio"
            aria-checked="true"
            data-i18n="modeShort"
          >
            短め
          </button>
          <button
            type="button"
            class="mode-btn"
            data-mode="detailed"
            role="radio"
            aria-checked="false"
            data-i18n="modeDetailed"
          >
            詳細
          </button>
        </div>
      </div>
    </header>
    <main>
      <div id="empty-state">
        <p data-i18n="emptyState">
          YouTube動画ページの「Summarize」ボタンを押してください。
        </p>
      </div>
      <div id="loading" hidden>
        <div class="spinner" aria-hidden="true"></div>
        <p id="loading-message">処理中...</p>
      </div>
      <div id="error" hidden>
        <p id="error-message"></p>
        <p id="error-detail" class="error-detail" hidden></p>
      </div>
      <article id="result" hidden>
        <p id="result-meta"></p>
        <div id="summary-content" class="markdown-body"></div>
      </article>
    </main>
    <script type="module" src="./sidepanel.ts"></script>
  </body>
</html>
